name: Python CI

on:
  push:
    branches: [ main, master, "feature/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout Central Tests
      uses: actions/checkout@v4
      with:
        repository: HyunchanAn/Dental_000
        path: Dental_000

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies (OpenCV)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install build pytest-cov

    - name: Lint with Ruff
      run: |
        ruff check . || echo "Ruff failed, but continuing"

    - name: Run . with PYTHONPATH=${{ github.workspace }} pytest
      run: |
        PYTHONPATH=${{ github.workspace }}:${{ github.workspace }}/src python -m pytest .
